<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111315">
  <title>АкадемМОТО</title>
  <link rel="manifest" href="./manifest.webmanifest?v=14">
  <link rel="stylesheet" href="./styles.css?v=14">
</head>
<body>
  <main class="app">
    <section id="loginView" class="screen">
      <header class="topbar">
        <div>
          <p class="eyebrow">АкадемМОТО</p>
          <h1>Мобильный заказ</h1>
        </div>
      </header>
      <form id="loginForm" class="panel">
        <label>Supabase URL
          <input id="supabaseUrl" autocomplete="url" value="https://cvsapxucinsypszhepik.supabase.co">
        </label>
        <label>Publishable key
          <input id="supabaseKey" autocomplete="off" value="sb_publishable_HgMLdfGK0XFSEqKchdKX3g_AwIoaYKT">
        </label>
        <label>Email
          <input id="email" type="email" autocomplete="email" value="admin@academmoto.local">
        </label>
        <label>Пароль
          <input id="password" type="password" autocomplete="current-password">
        </label>
        <button class="primary" type="submit">Войти</button>
        <p id="loginError" class="error"></p>
      </form>
    </section>

    <section id="mainView" class="screen hidden">
      <header class="topbar compact">
        <div>
          <p class="eyebrow">АкадемМОТО</p>
          <h1 id="viewTitle">Заказ</h1>
        </div>
        <button id="syncButton" class="icon-button" type="button">↻</button>
      </header>

      <section id="orderView" class="view">
        <div class="toolbar">
          <button id="newOrderButton" class="secondary" type="button">Новый</button>
          <button id="masterModeButton" class="secondary" type="button">Мастер</button>
          <button id="saveOrderButton" class="primary" type="button">Сохранить</button>
        </div>

        <div class="panel">
          <div class="grid two">
            <label>Номер
              <input id="orderNumber" inputmode="numeric">
            </label>
            <label>Дата
              <input id="orderDate" type="date">
            </label>
          </div>
          <label>Клиент
            <select id="orderClient"></select>
          </label>
          <label>Техника
            <input id="orderVehicle" placeholder="Марка / VIN">
          </label>
          <label>Пробег
            <input id="orderMileage" inputmode="numeric">
          </label>
          <label>Работник
            <select id="orderEmployee"></select>
          </label>
          <label>Статус
            <select id="orderStatus">
              <option value="accepted">Принято</option>
              <option value="in_progress">В работе</option>
              <option value="ready">Готов</option>
              <option value="closed">Закрыт</option>
            </select>
          </label>
          <label>Комментарий
            <textarea id="orderComment" rows="2"></textarea>
          </label>
        </div>

        <div class="panel">
          <div class="section-title">
            <h2>Позиции</h2>
            <div class="inline-actions">
              <button id="scanToOrderButton" class="secondary small" type="button">Скан</button>
              <button id="addLineButton" class="secondary small" type="button">Добавить</button>
            </div>
          </div>
          <div id="orderLines" class="list"></div>
          <div class="total-row">
            <span>Итого</span>
            <strong id="orderTotal">0 ₽</strong>
          </div>
        </div>
      </section>

      <section id="clientsView" class="view hidden">
        <form id="clientForm" class="panel">
          <h2>Новый клиент</h2>
          <label>ID клиента
            <input id="clientId" inputmode="numeric" placeholder="0001">
          </label>
          <label>ФИО
            <input id="clientName">
          </label>
          <label>Телефон
            <input id="clientPhone" inputmode="tel">
          </label>
          <label>Техника
            <input id="vehicleMake" placeholder="PitonMoto MX3">
          </label>
          <label>VIN
            <input id="vehicleVin">
          </label>
          <button class="primary" type="submit">Создать клиента</button>
        </form>
        <div class="panel">
          <label>Поиск клиентов
            <input id="clientSearch" placeholder="ФИО, телефон, техника, VIN">
          </label>
        </div>
        <div id="clientsList" class="list"></div>
      </section>

      <section id="catalogView" class="view hidden">
        <form id="catalogForm" class="panel">
          <h2>Новая позиция</h2>
          <label>Тип
            <select id="catalogCategory">
              <option value="parts">Запчасть</option>
              <option value="consumables">Расходник</option>
              <option value="labor">Работа</option>
            </select>
          </label>
          <label>ID
            <input id="catalogDisplayId" inputmode="numeric">
          </label>
          <label>Артикул
            <input id="catalogPartNumbers">
          </label>
          <label>Штрихкод
            <input id="catalogBarcode" inputmode="numeric" placeholder="создастся автоматически">
          </label>
          <button id="scanCatalogButton" class="secondary" type="button">Сканировать товар</button>
          <label>Раздел
            <input id="catalogGroup">
          </label>
          <label>Название
            <input id="catalogName">
          </label>
          <div class="grid two">
            <label>Продажа
              <input id="catalogPrice" inputmode="decimal">
            </label>
            <label>Закупка
              <input id="catalogPurchase" inputmode="decimal">
            </label>
          </div>
          <label>Остаток
            <input id="catalogStock" inputmode="decimal" value="1">
          </label>
          <button class="primary" type="submit">Создать позицию</button>
        </form>
        <div class="panel">
          <h2>Все товары</h2>
          <label>Поиск товаров
            <input id="catalogSearch" placeholder="Название, ID, артикул, штрихкод">
          </label>
        </div>
        <div id="catalogList" class="list"></div>
      </section>

      <section id="savedView" class="view hidden">
        <div class="panel">
          <label>Поиск заказов
            <input id="orderSearch" placeholder="Номер, клиент, техника">
          </label>
          <label>Статус
            <select id="orderStatusFilter">
              <option value="">Все</option>
              <option value="accepted">Принято</option>
              <option value="in_progress">В работе</option>
              <option value="ready">Готов</option>
              <option value="closed">Закрыт</option>
              <option value="not_paid">Не оплачен</option>
            </select>
          </label>
        </div>
        <div id="ordersList" class="list"></div>
      </section>

      <nav class="tabbar">
        <button data-view="orderView" class="active" type="button">Заказ</button>
        <button data-view="clientsView" type="button">Клиенты</button>
        <button data-view="catalogView" type="button">Товары</button>
        <button data-view="savedView" type="button">Заказы</button>
      </nav>
    </section>
  </main>

  <dialog id="lineDialog">
    <form method="dialog" class="dialog-card">
      <h2>Добавить позицию</h2>
      <label>Тип
        <select id="lineCategory">
          <option value="parts">Запчасти</option>
          <option value="labor">Работы</option>
          <option value="consumables">Расходники</option>
        </select>
      </label>
      <label>Поиск
        <input id="lineSearch" placeholder="Название, ID, артикул, штрихкод">
      </label>
      <button id="scanLineButton" class="secondary" type="button">Сканировать штрихкод</button>
      <label>Позиция
        <select id="lineItem"></select>
      </label>
      <div class="grid two">
        <label>Кол-во
          <input id="lineQuantity" inputmode="decimal" value="1">
        </label>
        <label>Цена
          <input id="linePrice" inputmode="decimal">
        </label>
      </div>
      <menu>
        <button value="cancel" class="secondary">Отмена</button>
        <button id="confirmLineButton" value="default" class="primary">Добавить</button>
      </menu>
    </form>
  </dialog>

  <dialog id="orderDialog">
    <div class="dialog-card">
      <div class="section-title">
        <h2 id="orderDialogTitle">Заказ</h2>
        <button id="closeOrderDialog" class="secondary small" type="button">×</button>
      </div>
      <div id="orderDialogInfo" class="details"></div>
      <div id="orderDialogLines" class="list"></div>
      <div class="total-row">
        <span>Итого</span>
        <strong id="orderDialogTotal">0 ₽</strong>
      </div>
      <div id="orderDialogPayments" class="details compact-details"></div>
      <menu class="three">
        <button id="editOrderButton" class="secondary" type="button">Редактировать</button>
        <button id="payOrderButton" class="secondary" type="button">Оплата</button>
        <button id="deleteOrderButton" class="danger" type="button">Удалить</button>
      </menu>
    </div>
  </dialog>

  <dialog id="paymentDialog">
    <form method="dialog" class="dialog-card">
      <h2 id="paymentTitle">Оплата</h2>
      <label>Сумма
        <input id="paymentAmount" inputmode="decimal">
      </label>
      <label>Комментарий
        <input id="paymentComment">
      </label>
      <menu>
        <button value="cancel" class="secondary">Отмена</button>
        <button id="confirmPaymentButton" value="default" class="primary">Добавить</button>
      </menu>
    </form>
  </dialog>

  <dialog id="catalogDialog">
    <form method="dialog" class="dialog-card">
      <h2 id="catalogDialogTitle">Товар</h2>
      <label>Название
        <input id="editCatalogName">
      </label>
      <div class="grid two">
        <label>Продажа
          <input id="editCatalogPrice" inputmode="decimal">
        </label>
        <label>Закупка
          <input id="editCatalogPurchase" inputmode="decimal">
        </label>
      </div>
      <div class="grid two">
        <label>Остаток
          <input id="editCatalogStock" inputmode="decimal">
        </label>
        <label>Мин. остаток
          <input id="editCatalogMinStock" inputmode="decimal">
        </label>
      </div>
      <label>Штрихкод
        <input id="editCatalogBarcode" inputmode="numeric">
      </label>
      <button id="scanCatalogEditButton" class="secondary" type="button">Сканировать штрихкод</button>
      <label>Раздел
        <input id="editCatalogGroup">
      </label>
      <label>Артикул
        <input id="editCatalogPartNumbers">
      </label>
      <label>Фото
        <input id="editCatalogPhoto">
      </label>
      <div class="grid two">
        <label>Приход
          <input id="receiptQuantity" inputmode="decimal" placeholder="кол-во">
        </label>
        <label>Закупка прихода
          <input id="receiptPurchase" inputmode="decimal">
        </label>
      </div>
      <menu class="three">
        <button value="cancel" class="secondary">Закрыть</button>
        <button id="receiptButton" class="secondary" type="button">Приход</button>
        <button id="saveCatalogEditButton" value="default" class="primary">Сохранить</button>
      </menu>
    </form>
  </dialog>

  <dialog id="clientDialog">
    <div class="dialog-card">
      <div class="section-title">
        <h2 id="clientDialogTitle">Клиент</h2>
        <button id="closeClientDialog" class="secondary small" type="button">×</button>
      </div>
      <div id="clientDialogInfo" class="details"></div>
      <h2>Техника</h2>
      <div id="clientDialogVehicles" class="list"></div>
      <h2>Заказы</h2>
      <div id="clientDialogOrders" class="list"></div>
      <menu>
        <button id="newClientOrderButton" class="primary" type="button">Новый заказ</button>
        <button id="closeClientDialogBottom" class="secondary" type="button">Закрыть</button>
      </menu>
    </div>
  </dialog>

  <dialog id="scannerDialog">
    <div class="dialog-card">
      <div class="section-title">
        <h2>Сканер</h2>
        <button id="closeScannerButton" class="secondary small" type="button">×</button>
      </div>
      <div id="html5Scanner" class="scanner-box"></div>
      <video id="scannerVideo" class="scanner-video hidden" playsinline muted></video>
      <p id="scannerStatus" class="scanner-status">Наведи камеру на штрихкод. Держи телефон дальше, чтобы код был резким.</p>
      <label>Штрихкод
        <input id="manualBarcode" inputmode="numeric" placeholder="можно ввести вручную">
      </label>
      <input id="barcodePhotoInput" class="hidden" type="file" accept="image/*" capture="environment">
      <menu>
        <button id="manualBarcodeButton" class="primary" type="button">Найти</button>
        <button id="barcodePhotoButton" class="secondary" type="button">Фото</button>
        <button id="stopScannerButton" class="secondary" type="button">Закрыть</button>
      </menu>
    </div>
  </dialog>

  <div id="toast" class="toast hidden"></div>
  <script src="./html5-qrcode.min.js?v=14"></script>
  <script src="./zxing.min.js?v=14"></script>
  <script type="module" src="./app.js?v=14"></script>
</body>
</html>
